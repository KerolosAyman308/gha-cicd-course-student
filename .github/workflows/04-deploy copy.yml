# This workflow completes the story by delivering the saved package.
# It starts after the build workflow finishes successfully.
name: 04 Deploy Copy Workflow

on:
  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-vars
  CONTAINER_NAME: tiny-health-cont
  BASE_IMAGE: python:3.12-slim
  APP_PORT: 8000

jobs:
  deploy-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set image tag
        id: image-tag
        run: |
          IMAGE_TAG="run-${GITHUB_RUN_NUMBER}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build docker with action
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          build-args: |
            PYTHON_VERSION=${{ env.BASE_IMAGE }}
            PORT=${{ env.APP_PORT }}
          file: ./DockerfileNew
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}

      - name: Start container
        run: |
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
            ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1
